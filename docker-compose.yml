version: '3.8'

services:
  # Servicio Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: cognichat-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    networks:
      - cognichat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Servicio CogniChat
  cognichat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cognichat-app
    ports:
      - "8501:8501"
    environment:
      # Configuración de Ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_TIMEOUT=120
      
      # Configuración de modelos por defecto
      - DEFAULT_LLM_MODEL=deepseek-r1:7b
      - DEFAULT_EMBEDDING_MODEL=nomic-embed-text:latest
      
      # Configuración RAG optimizada
      - CHUNK_SIZE=2000
      - CHUNK_OVERLAP=300
      - MAX_RETRIEVAL_DOCS=15
      - SIMILARITY_THRESHOLD=0.6
      
      # Configuración de generación de respuestas
      - MAX_RESPONSE_TOKENS=3000
      
      # Configuración de archivos
      - MAX_FILE_SIZE_MB=100
      
      # Configuración de logs
      - LOG_LEVEL=INFO
      
      # Configuración de trazabilidad
      - ENABLE_CHUNK_LOGGING=true
      - ENABLE_DEBUG_MODE=true
      - ENABLE_HISTORY_TRACKING=true
      
      # Configuración de Cache
      - CACHE_DIR=./data/cache
      - MAX_CACHE_SIZE=1000
      - CACHE_EXPIRY_HOURS=24
      
      # Configuración de Análisis Cualitativo Avanzado
      - ENABLE_ADVANCED_ANALYSIS=true
      - MAX_TOPICS=10
      - MIN_CLUSTER_SIZE=5
      - DEFAULT_CLUSTERING_METHOD=kmeans
      - NLTK_DATA_PATH=./data/nltk_data
      - SPACY_MODEL=es_core_news_sm
      
      # Configuración de Visualizaciones
      - PLOT_WIDTH=800
      - PLOT_HEIGHT=600
      - WORDCLOUD_WIDTH=800
      - WORDCLOUD_HEIGHT=400
      - CONCEPT_MAP_ITERATIONS=50
      
      # Configuración de Base de Datos
      - DB_PATH=./data/cognichat.db
      - VECTOR_DB_PATH=./data/chroma_db
      
      # Configuración de UI
      - DEFAULT_LANGUAGE=es
      - THEME=light
      - MAX_UPLOAD_SIZE_MB=200
      
      # Configuración de Seguridad
      - MAX_QUERY_LENGTH=1000
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW_MINUTES=60
      
      # Configuración específica de Streamlit
      - PORT=8501
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
    
    volumes:
      - cognichat_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cognichat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Servicio para inicializar modelos de Ollama
  ollama-init:
    image: ollama/ollama:latest
    container_name: cognichat-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - cognichat-network
    environment:
      - OLLAMA_HOST=ollama:11434
    command: >
      sh -c "
        echo '🚀 Inicializando modelos de Ollama...'
        
        echo '📥 Descargando modelo LLM: deepseek-r1:7b'
        ollama pull deepseek-r1:7b
        
        echo '📥 Descargando modelo de embeddings: nomic-embed-text:latest'
        ollama pull nomic-embed-text:latest
        
        echo '✅ Modelos inicializados correctamente'
        echo '🔍 Modelos disponibles:'
        ollama list
      "
    restart: "no"

volumes:
  ollama_data:
    driver: local
  cognichat_data:
    driver: local

networks:
  cognichat-network:
    driver: bridge